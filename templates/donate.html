<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder | Donate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #764ba2;
            --secondary-color: #667eea;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            color: #333;
            line-height: 1.6;
        }

        .donate-section {
            background: white;
            border-radius: 15px;
            padding: 3rem;
            margin: 3rem auto;
            max-width: 800px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .donate-header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem 0;
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--primary-color) 100%);
            color: white;
            border-radius: 15px;
            margin-top: -5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .donate-option {
            text-align: center;
            margin-bottom: 2rem;
            padding: 2rem;
            border-radius: 10px;
            border: 2px solid #e1e1e1;
            transition: all 0.3s ease;
        }

        .donate-option:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }

        .donate-icon {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .btn-donate {
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--primary-color) 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-donate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            color: white;
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}

    <div class="container">
        <div class="donate-header">
            <h1><i class="fas fa-heart me-3"></i>Support Our Project</h1>
            <p class="lead">Help us keep this service free and improve it further</p>
        </div>

        <div class="donate-section">
            <div class="row">
                <div class="col-md-4">
                    <div class="donate-option">
                        <i class="fas fa-coffee donate-icon"></i>
                        <h3>Buy us a coffee</h3>
                        <p></p>
                        <a href="#" class="btn btn-donate">Donate</a>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="donate-option">
                        <i class="fas fa-pizza-slice donate-icon"></i>
                        <h3>Buy us lunch</h3>
                        <p></p>
                        <a href="#" class="btn btn-donate">Donate</a>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="donate-option">
                        <i class="fas fa-gift donate-icon"></i>
                        <h3>Become a supporter</h3>
                        <p></p>
                        <a href="#" class="btn btn-donate">Donate</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
